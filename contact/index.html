<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>הקרקס של תום | צור קשר</title>
<meta name="description" content="מופע קרקס — תיאטרון פיזי ולהטוטנות ברמה בין-לאומית">
<meta property="og:title" content="הקרקס של תום">
<meta property="og:image" content="https://tomjuggling.com/tom-circus-icon.jpg">
<meta property="og:url" content="https://tomjuggling.com/contact">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #d4880a;
  --gold-light: #f0a820;
  --red: #c0392b;
  --dark-bg: #0e0905;
  --text-light: rgba(255,255,255,0.92);
  --text-muted: rgba(255,220,150,0.7);
}
* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }

body {
  font-family:'Heebo',sans-serif;
  background: var(--dark-bg);
  color: var(--text-light);
  min-height: 100vh;
  overflow-x: hidden;
}

/* BG IMAGE */
.bg-layer {
  position: fixed;
  inset: 0;
  background: url('../back-homepage.jpg') center center / cover no-repeat;
  z-index: 0;
}
.bg-overlay {
  position: fixed;
  inset: 0;
  background: linear-gradient(
    to bottom,
    rgba(8,4,2,0.72) 0%,
    rgba(8,4,2,0.55) 30%,
    rgba(8,4,2,0.78) 75%,
    rgba(8,4,2,0.92) 100%
  );
  z-index: 1;
}

/* CONTENT */
.page {
  position: relative;
  z-index: 2;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px 60px;
  gap: 0;
}

/* LOGO / TITLE */
.site-title {
  font-size: clamp(1rem, 3vw, 1.2rem);
  font-weight: 300;
  letter-spacing: 6px;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: 6px;
  animation: fadeDown 0.8s ease both;
}
.main-title {
  font-size: clamp(2.8rem, 10vw, 5.5rem);
  font-weight: 900;
  line-height: 1;
  letter-spacing: -1px;
  color: #fff;
  text-shadow: 0 2px 30px rgba(0,0,0,0.9);
  margin-bottom: 4px;
  animation: fadeDown 0.8s 0.1s ease both;
}
.main-title em {
  color: var(--gold);
  font-style: normal;
}
.subtitle {
  font-size: clamp(0.8rem, 2.5vw, 1rem);
  letter-spacing: 5px;
  text-transform: uppercase;
  color: var(--gold-light);
  font-weight: 600;
  margin-bottom: 36px;
  animation: fadeDown 0.8s 0.2s ease both;
}

/* DIVIDER LINE */
.divider {
  width: 60px;
  height: 2px;
  background: var(--gold);
  margin: 0 auto 36px;
  animation: scaleIn 0.8s 0.3s ease both;
}

/* VIDEO */
.video-wrap {
  width: 100%;
  max-width: 720px;
  margin-bottom: 40px;
  animation: fadeUp 0.9s 0.35s ease both;
}
.video-frame {
  position: relative;
  padding-bottom: 56.25%;
  height: 0;
  overflow: hidden;
  border: 2px solid rgba(212,136,10,0.5);
  box-shadow: 0 16px 60px rgba(0,0,0,0.85), 0 0 0 1px rgba(212,136,10,0.15);
}
.video-frame iframe {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  border: none;
}

/* CTA BUTTONS */
.cta-wrap {
  display: flex;
  flex-direction: column;
  gap: 16px;
  align-items: center;
  width: 100%;
  max-width: 380px;
  animation: fadeUp 0.9s 0.5s ease both;
}

.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  width: 100%;
  padding: 18px 28px;
  font-family: 'Heebo', sans-serif;
  font-size: 1.1rem;
  font-weight: 700;
  letter-spacing: 1px;
  text-decoration: none;
  border-radius: 4px;
  transition: transform 0.25s, box-shadow 0.25s, filter 0.25s;
  cursor: pointer;
  border: none;
}
.btn:hover {
  transform: translateY(-3px);
  filter: brightness(1.08);
}
.btn:active {
  transform: translateY(0);
}

.btn-wa {
  background: #25d366;
  color: #fff;
  box-shadow: 0 6px 28px rgba(37,211,102,0.4);
}
.btn-wa:hover {
  box-shadow: 0 10px 36px rgba(37,211,102,0.6);
}

.btn-vcard {
  background: rgba(255,255,255,0.07);
  color: #fff;
  border: 1.5px solid rgba(212,136,10,0.55);
  box-shadow: 0 4px 20px rgba(0,0,0,0.3);
}
.btn-vcard:hover {
  background: rgba(212,136,10,0.15);
  border-color: var(--gold);
  box-shadow: 0 8px 30px rgba(212,136,10,0.25);
}

/* FOOTER NOTE */
.footer-note {
  margin-top: 44px;
  font-size: 0.75rem;
  color: rgba(255,255,255,0.25);
  letter-spacing: 2px;
  text-transform: uppercase;
  animation: fadeUp 0.9s 0.7s ease both;
}
.footer-note a {
  color: rgba(212,136,10,0.5);
  text-decoration: none;
}
.footer-note a:hover {
  color: var(--gold);
}

/* ANIMATIONS */
@keyframes fadeDown {
  from { opacity:0; transform: translateY(-20px); }
  to   { opacity:1; transform: translateY(0); }
}
@keyframes fadeUp {
  from { opacity:0; transform: translateY(24px); }
  to   { opacity:1; transform: translateY(0); }
}
@keyframes scaleIn {
  from { opacity:0; transform: scaleX(0); }
  to   { opacity:1; transform: scaleX(1); }
}

/* MOBILE */
@media (max-width: 500px) {
  .page { padding: 30px 16px 50px; }
  .btn { font-size: 1rem; padding: 16px 20px; }
}
</style>
</head>
<body>

<div class="bg-layer"></div>
<div class="bg-overlay"></div>

<div class="page">

  <p class="site-title">הקרקס של תום</p>
  <h1 class="main-title">תום <em>אילון</em></h1>
  <p class="subtitle">אש · להטוטים · קסם · מוסיקה</p>

  <div class="divider"></div>

  <!-- VIDEO -->
  <div class="video-wrap">
    <div class="video-frame">
      <iframe
        src="https://www.youtube.com/embed/Al1GLVzuJI8?rel=0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen>
      </iframe>
    </div>
  </div>

  <!-- BUTTONS -->
  <div class="cta-wrap">

    <a href="https://wa.me/972505623865" target="_blank" class="btn btn-wa">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
        <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/>
      </svg>
      שלח וואטסאפ
    </a>

    <a href="tom.vcf" class="btn btn-vcard">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      שמור את אנשי הקשר שלי
    </a>

  </div>

  <p class="footer-note">
    <a href="https://tomjuggling.com">tomjuggling.com</a>
  </p>

</div>

<script>
function downloadVCard() {
  var vcf = [
    'BEGIN:VCARD',
    'VERSION:3.0',
    'FN:הקרקס של תום',
    'N:אילון;תום;;;',
    'ORG:הקרקס של תום',
    'TITLE:להטוטן ואמן קרקס',
    'TEL;TYPE=CELL,PREF:+972505623865',
    'EMAIL;TYPE=INTERNET:info@tomjuggling.com',
    'URL:https://www.tomjuggling.com',
    'END:VCARD'
  ].join('\r\n');

  var blob = new Blob([vcf], { type: 'text/vcard;charset=utf-8' });
  var url  = URL.createObjectURL(blob);
  var a    = document.createElement('a');
  a.href     = url;
  a.download = 'tom-juggling.vcf';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
</script>
</body>
</html>
